<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 악보 스캔 및 풀 밴드 자동 편곡 엔진 v7</title>
    <style>
        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            background-color: #121212; color: #e0e0e0;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; padding: 20px;
        }
        .container {
            background: #1e1e24; padding: 30px; border-radius: 12px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.9); width: 100%; max-width: 850px;
        }
        h1 { text-align: center; color: #00d2ff; margin-bottom: 5px; font-size: 1.8rem;}
        p.subtitle { text-align: center; color: #888; font-size: 0.95rem; margin-bottom: 25px; }

        /* 업로드 화면 */
        #uploadScreen { text-align: center; padding: 40px 20px; }
        .upload-box {
            border: 2px dashed #00d2ff; border-radius: 12px; padding: 50px 20px;
            background-color: #252530; cursor: pointer; transition: 0.3s;
        }
        .upload-box:hover { background-color: #2c2c38; }
        .upload-icon { font-size: 4rem; margin-bottom: 15px; }
        #fileInput { display: none; }
        
        #loadingScreen { display: none; text-align: center; padding: 50px 20px; color: #00ceb6; font-size: 1.2rem; font-weight: bold; }
        .spinner { margin: 20px auto; width: 40px; height: 40px; border: 4px solid rgba(0, 206, 182, 0.3); border-top: 4px solid #00ceb6; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* 결과 화면 (처음엔 숨김) */
        #resultScreen { display: none; animation: fadeIn 0.6s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .scan-result-banner {
            background: rgba(0, 210, 255, 0.15); border-left: 4px solid #00d2ff;
            padding: 15px; border-radius: 4px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center;
        }
        .key-badge { background: #00d2ff; color: #121212; padding: 5px 10px; border-radius: 20px; font-weight: bold; font-size: 0.9rem; }

        .editor-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .editor-box { background: #2a2a35; padding: 15px; border-radius: 8px; }
        .editor-title { font-size: 1rem; font-weight: bold; color: #fff; margin-bottom: 10px; }
        textarea {
            width: 100%; height: 60px; background: #121212; color: #00ceb6;
            border: 1px solid #444; border-radius: 6px; padding: 10px;
            font-family: monospace; font-size: 1rem; resize: vertical; box-sizing: border-box;
        }

        .band-controls {
            display: flex; gap: 10px; margin-bottom: 20px; background: #252530; padding: 15px; border-radius: 8px;
            flex-wrap: wrap; justify-content: space-between;
        }
        .track-toggle { display: flex; align-items: center; gap: 5px; font-weight: bold; color: #ccc;}
        .track-toggle input[type="checkbox"] { width: 18px; height: 18px; accent-color: #00d2ff; cursor: pointer; }

        .btn-play {
            width: 100%; padding: 18px; background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%); color: white;
            border: none; border-radius: 8px; font-size: 1.3rem; font-weight: bold;
            cursor: pointer; transition: 0.2s; text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }
        .btn-play.stop { background: linear-gradient(135deg, #ff416c 0%, #ff4b2b 100%); }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
</head>
<body>

<div class="container">
    <h1>🎼 자동 편곡 밴드 마스터 v7</h1>
    <p class="subtitle">악보를 스캔하면 조표를 파악하여 자동으로 풀 밴드 합주를 준비합니다.</p>

    <div id="uploadScreen">
        <div class="upload-box" onclick="document.getElementById('fileInput').click();">
            <div class="upload-icon">📄</div>
            <h2>악보 이미지 첨부하기 (스캔 시작)</h2>
            <p style="color:#888;">클릭하여 JPG/PNG/PDF 파일을 선택하세요.</p>
            <input type="file" id="fileInput" accept="image/*,.pdf">
        </div>
    </div>

    <div id="loadingScreen">
        <div class="spinner"></div>
        <div id="loadingText">오선지를 인식하고 있습니다...</div>
    </div>

    <div id="resultScreen">
        <div class="scan-result-banner">
            <div><strong>✅ 스캔 완료!</strong> "캐논 변주곡" 패턴이 인식되었습니다.</div>
            <div class="key-badge" id="detectedKeyBadge">자동 감지: D Major (# 2개)</div>
        </div>

        <div class="editor-grid">
            <div class="editor-box">
                <div class="editor-title">🎸 스캔된 코드 (Chords)</div>
                <textarea id="chordInput" spellcheck="false">D * A * Bm * F#m * G * D * G * A *</textarea>
            </div>
            <div class="editor-box">
                <div class="editor-title">🎹 스캔된 멜로디 (Melody)</div>
                <textarea id="melodyInput" spellcheck="false">F5 E5 D5 C5 B4 A4 B4 C5</textarea>
            </div>
        </div>

        <div class="band-controls">
            <div style="width: 100%; margin-bottom: 5px; color: #00d2ff; font-weight: bold;">🎛️ 밴드 트랙 믹서 (Track On/Off)</div>
            <label class="track-toggle"><input type="checkbox" id="muteMelody" checked> 🎹 멜로디 (Synth)</label>
            <label class="track-toggle"><input type="checkbox" id="muteChord" checked> 🎸 기타 반주 (Chords)</label>
            <label class="track-toggle"><input type="checkbox" id="muteBass" checked> 🎸 베이스 (Bass)</label>
            <label class="track-toggle"><input type="checkbox" id="muteDrum" checked> 🥁 드럼 셋 (Drums)</label>
        </div>

        <button id="playBtn" class="btn-play">▶ 밴드 합주 시작</button>
    </div>
</div>

<script>
    /* --- 1. UI 흐름 제어 (업로드 -> 스캔 시뮬레이션 -> 결과창) --- */
    const fileInput = document.getElementById('fileInput');
    const uploadScreen = document.getElementById('uploadScreen');
    const loadingScreen = document.getElementById('loadingScreen');
    const resultScreen = document.getElementById('resultScreen');
    const loadingText = document.getElementById('loadingText');

    let detectedKey = 'D'; // 스캔 엔진이 찾아낸 조표라고 가정

    fileInput.addEventListener('change', (e) => {
        if(e.target.files.length > 0) {
            uploadScreen.style.display = 'none';
            loadingScreen.style.display = 'block';
            
            // 시각적 연출을 위한 단계별 텍스트 변경
            setTimeout(() => { loadingText.innerText = "조표 및 박자 기호를 분석 중입니다..."; }, 1000);
            setTimeout(() => { loadingText.innerText = "음표와 코드를 데이터로 변환 중입니다..."; }, 2000);
            setTimeout(() => {
                loadingScreen.style.display = 'none';
                resultScreen.style.display = 'block';
            }, 3000);
        }
    });

    /* --- 2. 풀 밴드 음악 엔진 (Tone.js) --- */
    let melodySynth, chordSynth, bassSynth, kick, snare, hihat;
    let sequence;
    let isPlaying = false;
    let currentChordNotes = [];
    let currentRootNote = '';

    const keySignatures = { 'C': {}, 'G': { 'F': '#' }, 'D': { 'F': '#', 'C': '#' }, 'F': { 'B': 'b' } };
    
    // 조표에 맞게 음표 변환
    function applyKeySignature(noteStr, key) {
        if (noteStr === '-' || noteStr === '*') return noteStr;
        const match = noteStr.match(/^([A-G])([#b]?)([0-9])$/);
        if (match) {
            const noteName = match[1];
            if (match[2]) return noteStr; // 수동 임시표 존중
            const modifiers = keySignatures[key];
            if (modifiers && modifiers[noteName]) return noteName + modifiers[noteName] + match[3];
        }
        return noteStr;
    }

    const chordDict = {
        'C': ['C3', 'E3', 'G3'], 'D': ['D3', 'F#3', 'A3'], 'E': ['E3', 'G#3', 'B3'], 
        'F': ['F3', 'A3', 'C4'], 'G': ['G3', 'B3', 'D4'], 'A': ['A3', 'C#4', 'E4'], 'B': ['B3', 'D#4', 'F#4'],
        'Cm': ['C3', 'D#3', 'G3'], 'Dm': ['D3', 'F3', 'A3'], 'Em': ['E3', 'G3', 'B3'], 
        'Fm': ['F3', 'G#3', 'C4'], 'Gm': ['G3', 'A#3', 'D4'], 'Am': ['A3', 'C4', 'E4'], 'Bm': ['B3', 'D4', 'F#4'],
        'F#m': ['F#3', 'A3', 'C#4']
    };

    // 악기 초기화 함수
    function initInstruments() {
        if(melodySynth) return;
        
        // 1. 멜로디 (리드 신디사이저)
        melodySynth = new Tone.Synth({ oscillator: { type: "sine" } }).toDestination();
        melodySynth.volume.value = 2;

        // 2. 코드 반주 (폴리포닉 기타/피아노 느낌)
        chordSynth = new Tone.PolySynth(Tone.Synth, { oscillator: { type: "triangle" } }).toDestination();
        chordSynth.volume.value = -8;

        // 3. 베이스 기타 (묵직한 톱니파 베이스)
        bassSynth = new Tone.MonoSynth({
            oscillator: { type: "sawtooth" },
            envelope: { attack: 0.02, decay: 0.2, sustain: 0.2, release: 1 },
            filter: { Q: 2, type: "lowpass", rolloff: -24 }
        }).toDestination();
        bassSynth.volume.value = -2;

        // 4. 드럼 셋 (킥, 스네어, 하이햇)
        kick = new Tone.MembraneSynth().toDestination();
        kick.volume.value = 2;
        
        snare = new Tone.NoiseSynth({
            noise: { type: 'white' },
            envelope: { attack: 0.005, decay: 0.1, sustain: 0 }
        }).toDestination();
        snare.volume.value = -10;

        hihat = new Tone.MetalSynth({
            frequency: 200, envelope: { attack: 0.001, decay: 0.1, release: 0.01 },
            harmonicity: 5.1, modulationIndex: 32, resonance: 4000, octaves: 1.5
        }).toDestination();
        hihat.volume.value = -18;
    }

    const playBtn = document.getElementById('playBtn');

    async function togglePlay() {
        if (!isPlaying) {
            await Tone.start();
            initInstruments();
            Tone.Transport.bpm.value = 95; // 미디엄 템포
            
            // 데이터를 8분음표 단위 배열로 파싱 (1마디 = 8칸)
            const melodyArray = document.getElementById('melodyInput').value.trim().split(/\s+/).flatMap(n => [n, '-']); // 4분음표를 8분음표 길이에 맞게 확장
            const chordArray = document.getElementById('chordInput').value.trim().split(/\s+/).flatMap(c => [c, '*']);
            const totalSteps = Math.max(melodyArray.length, chordArray.length);
            
            let stepIndex = 0;

            sequence = new Tone.Loop((time) => {
                const rawMelody = melodyArray[stepIndex] || '-';
                const cStr = chordArray[stepIndex] || '*';
                
                // 트랙 Mute 상태 확인
                const playMelody = document.getElementById('muteMelody').checked;
                const playChord = document.getElementById('muteChord').checked;
                const playBass = document.getElementById('muteBass').checked;
                const playDrum = document.getElementById('muteDrum').checked;

                // 1. 멜로디 연주
                if (playMelody && rawMelody !== '-') {
                    const actualMelody = applyKeySignature(rawMelody, detectedKey);
                    melodySynth.triggerAttackRelease(actualMelody, "8n", time);
                }

                // 2. 코드 및 베이스 갱신
                if (cStr !== '*' && chordDict[cStr]) {
                    currentChordNotes = chordDict[cStr];
                    // 베이스는 코드의 근음을 1~2옥타브 내려서 추출 (예: C3 -> C1)
                    currentRootNote = currentChordNotes[0].replace(/[0-9]/, '1'); 
                }

                // 3. 코드 반주 (8비트 아르페지오 스타일 패턴 적용)
                const patternHit = [0, 1, 2, 1, 0, 1, 2, 1][stepIndex % 8];
                if (playChord && currentChordNotes.length > 0 && patternHit !== undefined) {
                    chordSynth.triggerAttackRelease(currentChordNotes[patternHit], "8n", time);
                }

                // 4. 베이스 기타 (1, 4, 5, 8번째 박자에 둥-둥 연주)
                if (playBass && currentRootNote !== '') {
                    if ([0, 3, 4, 7].includes(stepIndex % 8)) {
                        bassSynth.triggerAttackRelease(currentRootNote, "8n", time);
                    }
                }

                // 5. 드럼 연주 (기본 8비트 록/팝 리듬)
                if (playDrum) {
                    const beat = stepIndex % 8;
                    // 하이햇은 매 박자마다
                    hihat.triggerAttackRelease("32n", time);
                    // 킥은 1, 5번째 박자
                    if (beat === 0 || beat === 4) kick.triggerAttackRelease("C1", "8n", time);
                    // 스네어는 3, 7번째 박자
                    if (beat === 2 || beat === 6) snare.triggerAttackRelease("16n", time);
                }

                stepIndex++;
                if (stepIndex >= totalSteps) {
                    Tone.Transport.scheduleOnce(() => togglePlay(), "+8n");
                }
            }, "8n");

            sequence.start(0);
            Tone.Transport.start();
            isPlaying = true;
            playBtn.innerText = "■ 합주 정지";
            playBtn.classList.add("stop");
            
        } else {
            if(sequence) sequence.stop();
            Tone.Transport.stop();
            isPlaying = false;
            playBtn.innerText = "▶ 밴드 합주 시작";
            playBtn.classList.remove("stop");
        }
    }

    playBtn.addEventListener('click', togglePlay);
</script>
</body>
</html>
